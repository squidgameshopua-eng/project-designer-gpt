name: External Eval Specs

on:
  push:
    branches:
      - main
    paths:
      - 'evals/**'
      - 'reports/**'
      - 'scripts/validate_external_eval_specs.py'
      - '.github/workflows/external_evals.yml'
  workflow_dispatch:
  pull_request:
    paths:
      - 'evals/**'
      - 'reports/**'
      - 'scripts/validate_external_eval_specs.py'
      - '.github/workflows/external_evals.yml'

jobs:
  validate-external-eval-specs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Show Python version
        run: python3 --version

      - name: Validate repo-only external eval specs
        run: python3 scripts/validate_external_eval_specs.py
