name: Package Guard

on:
  pull_request:
    paths:
      - 'current/**'
      - '.github/workflows/package_guard.yml'
      - 'package_linter.py'
      - 'scripts/validate_package_guard.py'
  workflow_dispatch:

jobs:
  validate-package-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run package guard validation
        run: python scripts/validate_package_guard.py

      - name: Run package linter
        run: python package_linter.py
