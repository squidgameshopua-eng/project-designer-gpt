name: Package Guard

on:
  pull_request:
    paths:
      - 'current/**'
      - '.github/workflows/package_guard.yml'
      - 'package_linter.py'
      - 'scripts/validate_package_guard.py'
      - 'scripts/validate_rule_admission_guard.py'
  workflow_dispatch:

jobs:
  validate-package-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Show Python version
        run: python3 --version

      - name: Run package guard validation
        run: python3 scripts/validate_package_guard.py

      - name: Run rule admission guard validation
        run: python3 scripts/validate_rule_admission_guard.py

      - name: Run package linter
        run: python3 package_linter.py
